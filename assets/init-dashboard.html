<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSight — Test Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Grotesk', sans-serif; background: #0A0A0A; color: #F0F0F0; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 32px 16px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #2A2A2A; }
    .header h1 { font-size: 22px; font-weight: 600; background: linear-gradient(135deg, #6C63FF, #00D4AA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header .ver { font-size: 12px; color: #555; margin-left: auto; }
    .card { background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .project-path { font-size: 13px; color: #666; margin-bottom: 12px; word-break: break-all; }
    .stack-badge { font-size: 12px; color: #00D4AA; margin-bottom: 16px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .form-group { flex: 1; min-width: 140px; }
    .form-group label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
    .form-group select, .form-group input {
      width: 100%; padding: 10px 12px; background: #0A0A0A; border: 1px solid #333;
      border-radius: 6px; color: #F0F0F0; font-family: inherit; font-size: 14px;
    }
    .btn {
      padding: 14px 32px; border: none; border-radius: 8px; font-size: 16px;
      font-weight: 600; cursor: pointer; font-family: inherit; width: 100%;
    }
    .btn-primary { background: linear-gradient(135deg, #6C63FF, #5A52E0); color: white; }
    .btn-secondary { background: #1A1A1A; border: 1px solid #444; color: #F0F0F0; margin-top: 12px; }
    .btn-fix { background: linear-gradient(135deg, #00D4AA, #00A884); color: #0A0A0A; margin-top: 12px; display: none; }
    .btn-primary:hover, .btn-fix:hover { filter: brightness(1.08); }
    .btn-primary:disabled, .btn-fix:disabled { opacity: 0.4; cursor: not-allowed; }
    .hint { font-size: 13px; color: #888; margin-top: 12px; line-height: 1.5; }
    .summary-box {
      background: rgba(108, 99, 255, 0.08); border: 1px solid #333; border-radius: 8px;
      padding: 14px; margin-bottom: 12px; font-size: 14px; line-height: 1.5; color: #CCC;
    }
    .summary-box.warn { border-color: #FF6B6B; background: rgba(255, 107, 107, 0.08); }
    .summary-box.ok { border-color: #00D4AA; background: rgba(0, 212, 170, 0.08); }
    .steps { margin-top: 16px; }
    .step { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #222; }
    .step-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .step-pending { border: 2px solid #444; color: #666; }
    .step-running { border: 2px solid #6C63FF; color: #6C63FF; animation: pulse 1.5s infinite; }
    .step-done { background: #00D4AA; color: #0A0A0A; }
    .step-error { background: #FF6B6B; color: #0A0A0A; }
    .step-detail { font-size: 12px; color: #666; margin-left: auto; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .progress-bar { height: 4px; background: #2A2A2A; border-radius: 2px; margin: 16px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #6C63FF, #00D4AA); transition: width 0.4s; }
    .report-preview {
      background: #0A0A0A; border: 1px solid #333; border-radius: 8px; padding: 16px;
      margin-top: 12px; max-height: 420px; overflow-y: auto; font-family: monospace;
      font-size: 12px; white-space: pre-wrap; color: #CCC;
    }
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; z-index: 100; }
    .toast.show { display: block; }
    .toast-success { background: rgba(0,212,170,0.2); border: 1px solid #00D4AA; color: #00D4AA; }
    .toast-error { background: rgba(255,107,107,0.2); border: 1px solid #FF6B6B; color: #FF6B6B; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>DeepSight</h1>
      <span class="ver">v0.1.0</span>
    </div>

    <div class="card">
      <div class="card-title">Test this project</div>
      <div class="project-path" id="project-path">Project: —</div>
      <div class="stack-badge" id="stack-badge"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Test type</label>
          <select id="test-type">
            <option value="frontend">Frontend</option>
            <option value="backend">Backend</option>
            <option value="both">Both</option>
          </select>
        </div>
        <div class="form-group">
          <label>App port (Vite printed)</label>
          <input type="number" id="local-port" value="8080" min="1" max="65535">
        </div>
      </div>

      <p class="hint">Run once. Read the report. If something failed, click Fix this now and paste into Cursor.</p>
      <button class="btn btn-primary" id="run-btn" onclick="runPipeline()">Run DeepSight</button>
    </div>

    <div class="card" id="progress-card" style="display:none;">
      <div class="card-title">Progress</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="steps" id="steps-container"></div>
    </div>

    <div class="card" id="result-card" style="display:none;">
      <div class="card-title">Report</div>
      <div class="summary-box" id="summary-box"></div>
      <div class="report-preview" id="report-preview"></div>
      <button class="btn btn-secondary" id="full-report-btn" style="display:none;" onclick="openFullReport()">Open full report (HTML)</button>
      <button class="btn btn-fix" id="fix-btn" onclick="fixNow()">Fix this now — copy for Cursor</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const projectPath = params.get('project_path') || '';
    const portParam = params.get('local_port');
    if (portParam) document.getElementById('local-port').value = portParam;

    const projectEl = document.getElementById('project-path');
    if (!projectPath) projectEl.textContent = 'Add ?project_path= to the URL';
    else projectEl.textContent = 'Project: ' + projectPath;

    const steps = [
      { label: 'Scan your app' },
      { label: 'Build test plan' },
      { label: 'Run browser checks' },
      { label: 'Write report' },
    ];

    let lastRun = null;

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show toast-' + type;
      setTimeout(() => t.classList.remove('show'), 4000);
    }

    function renderSteps(active, status, detail) {
      document.getElementById('steps-container').innerHTML = steps.map((s, i) => {
        let cls = 'step-icon step-pending', icon = '○', det = '';
        if (i < active) { cls = 'step-icon step-done'; icon = '✓'; }
        else if (i === active) {
          cls = status === 'error' ? 'step-icon step-error' : 'step-icon step-running';
          icon = status === 'error' ? '✕' : '◉';
          det = detail || '';
        }
        return '<div class="step"><div class="' + cls + '">' + icon + '</div><div>' + s.label + '</div><div class="step-detail">' + det + '</div></div>';
      }).join('');
    }

    function getConfig() {
      return {
        projectPath,
        type: document.getElementById('test-type').value,
        localPort: parseInt(document.getElementById('local-port').value, 10),
        scope: 'codebase',
      };
    }

    function updateSummary(data) {
      const box = document.getElementById('summary-box');
      const run = data.run || {};
      const fixBtn = document.getElementById('fix-btn');
      if (data.status === 'ok' || run.ok) {
        box.className = 'summary-box ok';
        box.textContent = 'All checks passed. DeepSight ran successfully.';
        fixBtn.style.display = 'none';
      } else {
        box.className = 'summary-box warn';
        box.textContent =
          'DeepSight finished. ' + (run.passed || 0) + ' passed, ' + (run.failed || 0) + ' failed. ' +
          'This is normal on first run — often wrong port (try ' + getConfig().localPort + ' or what Vite shows). ' +
          'Click Fix this now, paste in Cursor, then run again.';
        fixBtn.style.display = 'block';
      }
    }

    async function loadReport() {
      const el = document.getElementById('report-preview');
      el.textContent = 'Loading…';
      try {
        const res = await fetch('/api/workflow-result?tab=report&projectPath=' + encodeURIComponent(projectPath));
        const data = await res.json();
        el.textContent = data.content || '(empty)';
      } catch (e) { el.textContent = e.message; }
    }

    async function runPipeline() {
      if (!projectPath) { showToast('Missing project_path in URL', 'error'); return; }
      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      btn.textContent = 'Running…';
      document.getElementById('progress-card').style.display = 'block';
      document.getElementById('result-card').style.display = 'none';
      renderSteps(0, 'running', 'Starting…');
      document.getElementById('progress-fill').style.width = '5%';

      try {
        renderSteps(2, 'running', 'Please wait…');
        document.getElementById('progress-fill').style.width = '50%';

        const res = await fetch('/api/run-pipeline', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getConfig()),
        });

        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch {
          throw new Error('Server error — restart: npm run build && npm run web in tools/deepsight');
        }
        if (!res.ok) throw new Error(data.error || data.detail || 'Run failed');

        lastRun = data;
        document.getElementById('stack-badge').textContent = 'Detected: ' + (data.stack || data.kind || 'web app');
        document.getElementById('progress-fill').style.width = '100%';
        renderSteps(steps.length, 'done', 'Done');

        document.getElementById('result-card').style.display = 'block';
        updateSummary(data);
        await loadReport();
        document.getElementById('full-report-btn').style.display = 'block';
        showToast(data.detail || 'Done', data.status === 'ok' ? 'success' : 'error');
        btn.textContent = data.status === 'ok' ? 'Run again' : 'Run again';
      } catch (e) {
        renderSteps(1, 'error', e.message);
        showToast(e.message, 'error');
        btn.textContent = 'Run DeepSight';
      }
      btn.disabled = false;
    }

    function openFullReport() {
      if (!projectPath) return;
      window.open('/api/full-report?projectPath=' + encodeURIComponent(projectPath), '_blank');
    }

    async function fixNow() {
      if (!projectPath) return;
      const btn = document.getElementById('fix-btn');
      btn.disabled = true;
      btn.textContent = 'Copying…';
      try {
        const res = await fetch('/api/fix-now', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ projectPath }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Fix payload failed');
        await navigator.clipboard.writeText(data.content || '');
        showToast('Copied — paste into Cursor chat', 'success');
        btn.textContent = 'Copied — paste in Cursor';
      } catch (e) {
        showToast(e.message, 'error');
        btn.textContent = 'Fix this now — copy for Cursor';
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
